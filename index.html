<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopify Profit Calculator | Store Profit Calc</title>
    <meta name="description" content="Free Shopify profit calculator. Calculate net profit, margin and ROI for your ecommerce store instantly.">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            padding: 40px;
            max-width: 600px;
            margin: auto;
        }
        h1 {
            text-align: center;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            background: black;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Shopify Profit Calculator</h1>

<div class="card">

    <label>Product Cost ($)</label>
    <input type="number" id="productCost" placeholder="e.g. 10">

    <label>Shipping Cost ($)</label>
    <input type="number" id="shippingCost" placeholder="e.g. 5">

    <label>Selling Price ($)</label>
    <input type="number" id="sellingPrice" placeholder="e.g. 39">

    <label>Transaction Fee (%)</label>
    <input type="number" id="transactionFee" placeholder="e.g. 2.9">

    <label>Ad Cost per Sale ($)</label>
    <input type="number" id="adCost" placeholder="e.g. 15">

    <button onclick="calculate()">Calculate Profit</button>

    <div class="result" id="result"></div>

</div>

<script>
function calculate() {

    let productCost = parseFloat(document.getElementById("productCost").value) || 0;
    let shippingCost = parseFloat(document.getElementById("shippingCost").value) || 0;
    let sellingPrice = parseFloat(document.getElementById("sellingPrice").value) || 0;
    let transactionFee = parseFloat(document.getElementById("transactionFee").value) || 0;
    let adCost = parseFloat(document.getElementById("adCost").value) || 0;

    let transactionCost = sellingPrice * (transactionFee / 100);

    let grossProfit = sellingPrice - productCost - shippingCost - transactionCost;
    let netProfit = grossProfit - adCost;

    let margin = sellingPrice > 0 ? (netProfit / sellingPrice) * 100 : 0;

    document.getElementById("result").innerHTML =
        "Gross Profit: $" + grossProfit.toFixed(2) + "<br>" +
        "Net Profit: $" + netProfit.toFixed(2) + "<br>" +
        "Profit Margin: " + margin.toFixed(2) + "%";
}
</script>

</body>
</html>
